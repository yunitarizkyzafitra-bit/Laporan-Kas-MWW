<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kas DPW Muslimah Wahdah Wilayah Sulawesi Tengah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 font-sans">

    <div id="screen-login" class="min-h-screen flex flex-col items-center justify-center p-4 bg-teal-50">
        <img src="logo-mww-png.png" alt="Logo MWW" class="w-20 h-20 mb-3 object-contain">
        <form id="form-login" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-teal-100">
            <input type="text" id="login-username" placeholder="Username" required class="w-full p-3 mb-4 bg-slate-50 border rounded-xl text-xs font-bold">
            <div class="relative mb-6">
                <input type="password" id="login-password" placeholder="Password" required class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold">
                <i id="icon-mata" class="fa-solid fa-eye absolute right-4 top-4 cursor-pointer text-slate-400" onclick="togglePassword()"></i>
            </div>
            <button type="submit" class="w-full bg-teal-600 text-white font-bold p-3 rounded-xl text-xs uppercase">MASUK</button>
        </form>
    </div>

    <div id="screen-dashboard" class="hidden min-h-screen flex flex-col">
        <header class="bg-teal-600 text-white px-6 py-4 shadow-md">
            <h1 class="text-xs font-black uppercase">DPW MUSLIMAH WAHDAH SULAWESI TENGAH</h1>
        </header>

        <div class="flex-1 flex flex-col md:flex-row">
            <nav class="w-full md:w-64 bg-teal-950 p-4 flex md:flex-col gap-2">
                <button onclick="pindahMenu('menu-ringkasan')" id="btn-menu-ringkasan" class="nav-link px-4 py-3 text-xs font-bold rounded-xl bg-teal-600 text-white">Laporan Kas</button>
                <button onclick="pindahMenu('menu-tambah')" id="btn-menu-tambah" class="nav-link px-4 py-3 text-xs font-bold rounded-xl text-teal-300">Tambah Transaksi</button>
            </nav>

            <main class="flex-1 p-6">
                <div id="menu-ringkasan" class="menu-content">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-white p-4 rounded-xl border">
                            <p class="text-[10px] text-gray-500">Saldo Awal</p>
                            <p id="card-saldo-awal" class="font-bold text-sm">Rp 0</p>
                        </div>
                        <div class="bg-white p-4 rounded-xl border">
                            <p class="text-[10px] text-teal-600">Pemasukan</p>
                            <p id="card-pemasukkan" class="font-bold text-sm">Rp 0</p>
                        </div>
                        <div class="bg-white p-4 rounded-xl border">
                            <p class="text-[10px] text-rose-600">Pengeluaran</p>
                            <p id="card-pengeluaran" class="font-bold text-sm">Rp 0</p>
                        </div>
                        <div class="bg-white p-4 rounded-xl border bg-teal-50">
                            <p class="text-[10px] text-teal-800">Saldo Akhir</p>
                            <p id="card-saldo-akhir" class="font-bold text-sm">Rp 0</p>
                        </div>
                    </div>
                    <table class="w-full text-xs bg-white rounded-xl shadow">
                        <thead><tr class="border-b"><th>Tanggal</th><th>Jenis</th><th>Nominal</th></tr></thead>
                        <tbody id="tabel-kas-body"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbz1vLQDrgA4uNIux4A9JUCzoY21CXXb7tUVMsWajKYDb-l4i6vxSvaO7wT3KoEAul0rJg/exec"; 
        const SALDO_AWAL = 16152981;
        let KREDENSIAL = { user: "", pin: "" };

        // Toggle Password
        function togglePassword() {
            const i = document.getElementById('login-password');
            const icon = document.getElementById('icon-mata');
            if (i.type === "password") { i.type = "text"; icon.className = "fa-solid fa-eye-slash absolute right-4 top-4 cursor-pointer text-slate-400"; }
            else { i.type = "password"; icon.className = "fa-solid fa-eye absolute right-4 top-4 cursor-pointer text-slate-400"; }
        }

        // Pindah Menu
        function pindahMenu(id) {
            document.querySelectorAll('.menu-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // Login & Sinkronisasi
        window.onload = () => {
            fetch(URL_API + "?action=read").then(r => r.json()).then(res => {
                KREDENSIAL = { user: res.user, pin: res.pin };
                let masuk = 0, keluar = 0;
                const tbody = document.getElementById('tabel-kas-body');
                res.transaksi.forEach(t => {
                    masuk += Number(t.kredit);
                    keluar += Number(t.debit);
                    tbody.innerHTML += `<tr><td class="p-3">${t.tanggal}</td><td class="p-3">${t.jenis}</td><td class="p-3">Rp ${Number(t.kredit||t.debit).toLocaleString()}</td></tr>`;
                });
                document.getElementById('card-pemasukkan').innerText = "Rp " + masuk.toLocaleString();
                document.getElementById('card-pengeluaran').innerText = "Rp " + keluar.toLocaleString();
                document.getElementById('card-saldo-awal').innerText = "Rp " + SALDO_AWAL.toLocaleString();
                document.getElementById('card-saldo-akhir').innerText = "Rp " + (SALDO_AWAL + masuk - keluar).toLocaleString();
            });
        };

        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('login-username').value === KREDENSIAL.user && document.getElementById('login-password').value === KREDENSIAL.pin) {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-dashboard').classList.remove('hidden');
            } else { alert("User/PIN Salah"); }
        });
    </script>
</body>
</html>
