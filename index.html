<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - MWW Sulteng</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a; 
        }
        /* Ornamen Atas - Sentuhan Gradasi Biru Relaxa Cerah */
        .top-right-curve {
            position: absolute;
            top: -10%;
            right: -15%;
            width: 75vw;
            height: 75vw;
            max-width: 300px;
            max-height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a5f3fc 0%, #06b6d4 100%); /* Cyan / Biru Relaxa */
        }
        /* Ornamen Bawah - Gradasi Gelap ke Biru Relaxa yang Sejuk */
        .bottom-curve {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%); /* Khas Relaxa Segar */
            border-top-left-radius: 3.5rem;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen sm:p-4">

    <!-- CONTAINER INTEGRATED (RESPONSIF UNTUK ANDROID & IOS) -->
    <div class="relative w-full h-screen sm:w-[390px] sm:h-[844px] bg-white sm:rounded-[40px] sm:shadow-2xl overflow-hidden flex flex-col justify-between sm:border-8 sm:border-slate-800">
        
        <!-- Ornamen Atas Biru Relaxa -->
        <div class="top-right-curve"></div>

        <!-- TEKS PENGANTAR (TENGAH) -->
        <div class="relative z-10 mt-[45%] px-8 flex-1">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight leading-none mb-3">
                Get<br>Started
            </h1>
            <p class="text-sm font-medium text-slate-400">
                Start with sign up or sign in
            </p>
        </div>

        <!-- AREA TOMBOL AKSI (BAWAH) -->
        <div class="relative w-full h-[35%] flex flex-col justify-end pb-12 px-8">
            <!-- Background Curve Biru Relaxa -->
            <div class="bottom-curve"></div>
            
            <!-- Tombol Navigasi Interaktif -->
            <div class="relative z-10 space-y-3.5 w-full">
                <!-- Tombol SIGN UP -->
                <a href="#signup" class="block w-full bg-white text-center text-cyan-900 font-bold text-xs uppercase tracking-wider py-4 rounded-full shadow-md active:bg-cyan-50 transition duration-150">
                    Sign Up
                </a>
                
                <!-- Tombol SIGN IN -->
                <a href="#signin" class="block w-full text-center text-white border-2 border-white/80 font-bold text-xs uppercase tracking-wider py-3.5 rounded-full backdrop-blur-xs active:bg-white/10 transition duration-150">
                    Sign In
                </a>
            </div>
        </div>

    </div>

</body>
</html>
