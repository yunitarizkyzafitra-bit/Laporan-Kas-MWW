<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan Premium - MW Sulteng</title>
    <!-- Tailwind CSS (Akan di-cache otomatis oleh browser setelah loading pertama) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js (Akan di-cache otomatis oleh browser) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts Premium Aura -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f4f9f6 0%, #e8f5ed 100%);
        }
        .bg-luxury-green {
            background: linear-gradient(135deg, #0b4f36 0%, #166544 50%, #0d9488 100%);
        }
        .curve-premium {
            border-bottom-left-radius: 2.5rem;
            border-bottom-right-radius: 2.5rem;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 pb-12">

    <!-- HEADER PREMIUM & MEWAH DENGAN LOGO MW -->
    <div class="bg-luxury-green text-white pt-6 pb-14 px-6 curve-premium shadow-xl relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-2xl -mr-10 -mt-10"></div>
        <div class="absolute bottom-0 left-0 w-40 h-40 bg-teal-400/10 rounded-full blur-3xl -ml-10 -mb-10"></div>

        <div class="flex justify-between items-center relative z-10">
            <!-- LOGO DAN EMBLEM ORGANISASI -->
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-xl p-1.5 shadow-md flex items-center justify-center border border-emerald-400/30">
                    <!-- Menggunakan logo vektor resmi Wahdah Islamiyah & Muslimah Wahdah -->
                    <svg viewBox="0 0 100 100" class="w-full h-full text-[#0b4f36]" fill="currentColor">
                        <path d="M50 5C25.1 5 5 25.1 5 50s20.1 45 45 45 45-20.1 45-45S74.9 5 50 5zm0 82c-20.4 0-37-16.6-37-37s16.6-37 37-37 37 16.6 37 37-16.6 37-37 37z"/>
                        <path d="M50 20c-16.6 0-30 13.4-30 30s13.4 30 30 30 30-13.4 30-30-13.4-30-30-30zm-4 44H36V36h10v28zm18 0h-10V36h10v28z" fill="#d4af37"/>
                        <circle cx="50" cy="50" r="8" fill="#0b4f36"/>
                    </svg>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-emerald-200 font-bold">Laporan Keuangan Internal</p>
                    <h1 class="text-lg font-extrabold tracking-tight leading-tight">Muslimah Wahdah</h1>
                    <p class="text-xs text-emerald-100/80">Wilayah Sulawesi Tengah</p>
                </div>
            </div>
            <div class="flex flex-col items-end gap-1">
                <span class="bg-white/10 px-2.5 py-0.5 rounded-full text-[10px] font-semibold border border-white/20 backdrop-blur-xs">Mei 2026</span>
                <!-- Indikator Mode Offline / Storage Status -->
                <span id="offline-status" class="bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded-full text-[9px] font-bold border border-emerald-400/30 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> Mode Offline Aktif
                </span>
            </div>
        </div>

        <!-- TOTAL SALDO KAS UTAMA -->
        <div class="mt-8 text-center relative z-10">
            <p class="text-[10px] uppercase tracking-widest text-emerald-300 font-bold mb-1">Total Saldo Kas Saat Ini</p>
            <p class="text-3xl font-black text-white tracking-tight" id="saldo-akhir">Rp 16.152.981</p>
            <div class="w-12 h-1 bg-gradient-to-r from-teal-400 to-emerald-300 mx-auto mt-3 rounded-full"></div>
        </div>
    </div>

    <!-- KARTU ARUS KAS -->
    <div class="grid grid-cols-2 gap-4 px-6 -mt-7 relative z-20">
        <div class="bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-md border-b-4 border-emerald-500">
            <div class="flex items-center gap-1.5 mb-1">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Arus Masuk</span>
            </div>
            <span class="text-base font-extrabold text-emerald-700 block" id="total-masuk">Rp 0</span>
        </div>
        <div class="bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-md border-b-4 border-rose-500">
            <div class="flex items-center gap-1.5 mb-1">
                <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
                <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Arus Keluar</span>
            </div>
            <span class="text-base font-extrabold text-rose-700 block" id="total-keluar">Rp 0</span>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="p-6 space-y-6">

        <!-- PRESENTASI GRAFIK ARUS KAS -->
        <div class="bg-white p-5 rounded-3xl shadow-xs border border-emerald-100/50">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xs font-extrabold text-slate-700 uppercase tracking-wider flex items-center gap-2">
                    <span class="w-1.5 h-3.5 bg-emerald-600 rounded-full"></span> Presentasi Arus Kas
                </h3>
                <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-md">Lokal Storage</span>
            </div>
            <div class="w-full max-w-[180px] mx-auto my-2">
                <canvas id="cashFlowChart"></canvas>
            </div>
        </div>

        <!-- FORM INPUT DATA TRANSAKSI (MENDUKUNG OFFLINE & AUTO SAVE) -->
        <div class="bg-white p-5 rounded-3xl shadow-xs border border-emerald-100/50">
            <h3 class="text-xs font-extrabold text-slate-700 uppercase tracking-wider mb-4 flex items-center gap-2">
                <span class="w-1.5 h-3.5 bg-emerald-600 rounded-full"></span> Input Transaksi Baru (Offline)
            </h3>
            <form id="form-transaksi" class="space-y-3.5" onsubmit="tambahTransaksi(event)">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tanggal & Waktu</label>
                        <input type="datetime-local" id="input-tanggal" required class="w-full text-xs p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Jenis Arus</label>
                        <select id="input-jenis" class="w-full text-xs p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-600">
                            <option value="Masuk">Arus Masuk (Kredit)</option>
                            <option value="Keluar">Arus Keluar (Debit)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Detail Keterangan</label>
                    <input type="text" id="input-keterangan" placeholder="Contoh: Pemindahbukan Dana Qurban MMW" required class="w-full text-xs p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-600">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Divisi / Alokasi</label>
                        <input type="text" id="input-divisi" placeholder="Contoh: Qurban" required class="w-full text-xs p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nominal (Rp)</label>
                        <input type="number" id="input-jumlah" placeholder="0" required class="w-full text-xs p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-600">
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold text-xs py-2.5 px-4 rounded-xl shadow-xs transition duration-200 mt-2 cursor-pointer">
                    Simpan Transaksi Secara Lokal
                </button>
            </form>
        </div>

        <!-- REALISASI ANGGARAN DIVISI -->
        <div class="bg-white p-5 rounded-3xl shadow-xs border border-emerald-100/50">
            <h3 class="text-xs font-extrabold text-slate-700 uppercase tracking-wider mb-4 flex items-center gap-2">
                <span class="w-1.5 h-3.5 bg-emerald-600 rounded-full"></span> Realisasi Anggaran Divisi
            </h3>
            <div class="space-y-3.5" id="container-divisi"></div>
        </div>

        <!-- URAIAN BELANJA & RIWAYAT TRANSAKSI -->
        <div class="bg-white p-5 rounded-3xl shadow-xs border border-emerald-100/50">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-xs font-extrabold text-slate-700 uppercase tracking-wider flex items-center gap-2">
                    <span class="w-1.5 h-3.5 bg-emerald-600 rounded-full"></span> Riwayat Uraian Belanja
                </h3>
                <button onclick="clearData()" class="text-[9px] font-bold text-rose-500 hover:underline bg-rose-50 px-2 py-1 rounded-md cursor-pointer">Reset Data</button>
            </div>
            <div class="divide-y divide-slate-100 max-h-80 overflow-y-auto space-y-2.5 pr-1" id="container-belanja"></div>
        </div>

    </div>

    <!-- SISTEM KESELURUHAN ENGINE & PENYIMPANAN DATA OFFLINE (LOCALSTORAGE) -->
    <script>
        // Data Awal Default sebagai basis data jika penyimpanan offline masih kosong
        const defaultTransaksi = [
            { tanggal: "28 Mei 2026 13.40", keterangan: "Pemindahbukan mika kadoanqan qurban mww", jenis: "Keluar", jumlah: 645000, divisi: "Qurban" },
            { tanggal: "28 Mei 2026 12.21", keterangan: "Pemindahbukan dana operasional 2 soal mww", jenis: "Keluar", jumlah: 1000000, divisi: "Operasional" },
            { tanggal: "26 Mei 2026 02.32", keterangan: "Biaya Administrasi bulanan", jenis: "Keluar", jumlah: 2000, divisi: "Umum/Admin" },
            { tanggal: "25 Mei 2026 14.28", keterangan: "Pemindahbukan dan sosial qurban MMW", jenis: "Keluar", jumlah: 16500000, divisi: "Qurban / Sosial" },
            { tanggal: "25 Mei 2026 09.25", keterangan: "Pemindahbukan Dana Qurban MMW", jenis: "Masuk", jumlah: 17500000, divisi: "Qurban" },
            { tanggal: "23 Mei 2026 10:12", keterangan: "Pemindahbukan Dana qurban mww sulteng", jenis: "Keluar", jumlah: 19800000, divisi: "Qurban" },
            { tanggal: "23 Mei 2026 10:00", keterangan: "Pemindahbukan dan qurban 3 orang", jenis: "Masuk", jumlah: 7500000, divisi: "Qurban" },
            { tanggal: "16 Mei 2026 12:24", keterangan: "Pemindahbukan khidmat untuk winarti", jenis: "Keluar", jumlah: 250000, divisi: "Sosial / Khidmat" },
            { tanggal: "05 Mei 2026 15:34", keterangan: "Pemindahbukan GDR MW SULTENG", jenis: "Masuk", jumlah: 22683000, divisi: "GDR MW Sulteng" },
            { tanggal: "05 Mei 2026 12:38", keterangan: "Dana Amplop Ramadhan", jenis: "Masuk", jumlah: 180000, divisi: "Ramadhan" }
        ];

        let dataTransaksi = [];
        let chartInstance = null;

        // FUNGSI UTAMA: Memuat Data dari LocalStorage Browser (Sistem Offline)
        function loadDataOffline() {
            const dataLokal = localStorage.getItem('mw_sulteng_cashflow');
            if (dataLokal) {
                dataTransaksi = JSON.parse(dataLokal);
            } else {
                dataTransaksi = [...defaultTransaksi];
                localStorage.setItem('mw_sulteng_cashflow', JSON.stringify(dataTransaksi));
            }
        }

        function formatRupiah(angka) {
            return "Rp " + angka.toLocaleString('id-ID');
        }

        function renderDashboard() {
            let totalMasuk = 0;
            let totalKeluar = 0;
            let saldoAwal = 16152981; // Saldo awal BSI

            const belanjaContainer = document.getElementById('container-belanja');
            belanjaContainer.innerHTML = '';
            
            dataTransaksi.forEach(item => {
                if (item.jenis === "Masuk") totalMasuk += item.jumlah;
                if (item.jenis === "Keluar") totalKeluar += item.jumlah;

                const isMasuk = item.jenis === "Masuk";
                belanjaContainer.innerHTML += `
                    <div class="flex justify-between items-center py-2 text-xs border-b border-slate-50">
                        <div>
                            <p class="font-bold text-slate-700">${item.keterangan}</p>
                            <p class="text-[9px] text-slate-400 font-medium">${item.tanggal} • Div. ${item.divisi}</p>
                        </div>
                        <span class="font-extrabold ${isMasuk ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50'} px-2 py-1 rounded-lg">
                            ${isMasuk ? '+' : '-'} ${formatRupiah(item.jumlah)}
                        </span>
                    </div>
                `;
            });

            let saldoAkhir = saldoAwal + totalMasuk - totalKeluar;

            document.getElementById('saldo-akhir').innerText = formatRupiah(saldoAkhir);
            document.getElementById('total-masuk').innerText = formatRupiah(totalMasuk);
            document.getElementById('total-keluar').innerText = formatRupiah(totalKeluar);

            renderDivisiSummary();
            updateChart(totalMasuk, totalKeluar);
        }

        function renderDivisiSummary() {
            const divisiContainer = document.getElementById('container-divisi');
            divisiContainer.innerHTML = '';
            
            let akumulasi = {};
            dataTransaksi.filter(t => t.jenis === "Keluar").forEach(t => {
                akumulasi[t.divisi] = (akumulasi[t.divisi] || 0) + t.jumlah;
            });

            Object.keys(akumulasi).forEach(key => {
                let paguSimulasi = 30000000;
                let persen = Math.min((akumulasi[key] / paguSimulasi) * 100, 100);
                
                divisiContainer.innerHTML += `
                    <div class="text-xs">
                        <div class="flex justify-between font-semibold text-slate-600 mb-1">
                            <span class="font-bold text-slate-700">${key}</span>
                            <span class="text-slate-400 text-[10px]">${formatRupiah(akumulasi[key])}</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div class="bg-gradient-to-r from-emerald-600 to-teal-400 h-full rounded-full" style="width: ${persen}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        function updateChart(masuk, keluar) {
            const ctx = document.getElementById('cashFlowChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            // Proteksi jika data kosong
            if(masuk === 0 && keluar === 0) { masuk = 1; }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Masuk', 'Keluar'],
                    datasets: [{
                        data: [masuk, keluar],
                        backgroundColor: ['#10b981', '#f43f5e'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 10, font: { size: 9, weight: 'bold' } }
                        }
                    },
                    cutout: '72%'
                }
            });
        }

        // AKSI: Tambah Transaksi & Auto Save ke Memori Offline Browser
        function tambahTransaksi(e) {
            e.preventDefault();
            
            const rawTanggal = document.getElementById('input-tanggal').value;
            const dateObj = new Date(rawTanggal);
            const opsi = { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            const tanggalFormatted = dateObj.toLocaleDateString('id-ID', opsi).replace(/:/g, '.');

            const itemBaru = {
                tanggal: tanggalFormatted,
                jenis: document.getElementById('input-jenis').value,
                keterangan: document.getElementById('input-keterangan').value,
                divisi: document.getElementById('input-divisi').value,
                jumlah: parseInt(document.getElementById('input-jumlah').value)
            };

            dataTransaksi.unshift(itemBaru);
            
            // Menyimpan ke memori internal browser secara permanen
            localStorage.setItem('mw_sulteng_cashflow', JSON.stringify(dataTransaksi));
            
            document.getElementById('form-transaksi').reset();
            renderDashboard();
        }

        // AKSI: Reset Data Kembali ke Setelan Awal
        function clearData() {
            if(confirm("Apakah Anda yakin ingin menyetel ulang data ke data bawaan Rekening Koran Mei 2026?")) {
                localStorage.removeItem('mw_sulteng_cashflow');
                loadDataOffline();
                renderDashboard();
            }
        }

        // Monitoring status jaringan internet
        window.addEventListener('online', () => {
            document.getElementById('offline-status').className = "bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded-full text-[9px] font-bold border border-emerald-400/30 flex items-center gap-1";
        });
        window.addEventListener('offline', () => {
            document.getElementById('offline-status').className = "bg-amber-500/20 text-amber-300 px-2 py-0.5 rounded-full text-[9px] font-bold border border-amber-400/30 flex items-center gap-1";
        });

        // Jalankan Inisialisasi Pertama
        window.onload = function() {
            loadDataOffline();
            renderDashboard();
        };
    </script>
</body>
</html>
