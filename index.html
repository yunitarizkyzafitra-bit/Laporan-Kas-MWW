<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kas DPW Muslimah Wahdah Wilayah Sulawesi Tengah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <div id="screen-login" class="min-h-screen flex flex-col items-center justify-center p-4 bg-teal-50">
        <div class="flex flex-col items-center mb-6 text-center max-w-sm">
            <img src="logo-mww-png.png" alt="Logo MWW" class="w-20 h-20 mb-3 object-contain">
            <h1 class="text-xs font-black text-teal-900 tracking-wider uppercase">DPW MUSLIMAH WAHDAH WILAYAH SULAWESI TENGAH</h1>
        </div>
        <form id="form-login" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-teal-100">
            <input type="text" id="login-username" placeholder="Username" required class="w-full p-3 mb-4 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold">
            <input type="password" id="login-password" placeholder="Password" required class="w-full p-3 mb-6 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold">
            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold p-3 rounded-xl text-xs uppercase">MASUK</button>
        </form>
    </div>

    <div id="screen-dashboard" class="hidden min-h-screen flex flex-col">
        <header class="bg-teal-600 text-white px-6 py-4 flex items-center gap-4 shadow-md">
            <img src="logo-mww-png.png" alt="Logo" class="w-12 h-12 bg-white rounded-full p-1 object-contain shrink-0">
            <div>
                <p class="text-[10px] uppercase font-bold text-teal-100">Aplikasi Laporan Kas</p>
                <h1 class="text-xs md:text-sm font-black uppercase">DPW MUSLIMAH WAHDAH WILAYAH SULAWESI TENGAH</h1>
            </div>
        </header>

        <div class="flex-1 flex flex-col md:flex-row">
            <div class="w-full md:w-64 bg-teal-950 p-4 flex md:flex-col gap-2">
                <button onclick="pindahMenu('menu-ringkasan')" class="nav-link px-4 py-3 text-xs font-bold rounded-xl bg-teal-600 text-white">Laporan Kas</button>
                <button onclick="pindahMenu('menu-tambah')" class="nav-link px-4 py-3 text-xs font-bold rounded-xl text-teal-300">Tambah Transaksi</button>
                <a href="https://docs.google.com/spreadsheets/d/1J1pR8fdy6kzrmxJMNTOsB-v7tMD2HemZ9hUc5OXdTHw" target="_blank" class="mt-4 px-4 py-2 text-[10px] text-teal-400 font-bold underline">Cek Spreadsheet</a>
            </div>

            <main class="flex-1 p-6 overflow-y-auto">
                <div id="menu-ringkasan" class="menu-content">
                    <h2 class="text-base font-black text-slate-800 mb-6">Laporan Buku Kas Utama</h2>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
                        <table class="w-full text-xs text-left">
                            <thead class="bg-slate-50 border-b"><tr><th class="p-3">Tanggal</th><th class="p-3">Nama</th><th class="p-3">Jenis</th><th class="p-3">Uraian</th><th class="p-3">Nominal</th></tr></thead>
                            <tbody id="tabel-kas-body"></tbody>
                        </table>
                    </div>
                </div>

                <div id="menu-tambah" class="menu-content hidden">
                    <form id="form-transaksi" class="bg-white p-6 rounded-2xl border border-slate-200 max-w-sm shadow-sm">
                        <h2 class="font-black text-slate-800 mb-4 text-xs uppercase text-teal-700">Form Transaksi Baru</h2>
                        <input type="date" id="ins-tanggal" required class="w-full p-2.5 bg-slate-50 border rounded-xl mb-3 text-xs">
                        <input type="text" id="ins-nama" placeholder="Nama Input" required class="w-full p-2.5 bg-slate-50 border rounded-xl mb-3 text-xs">
                        <select id="ins-jenis" class="w-full p-2.5 bg-slate-50 border rounded-xl mb-3 text-xs">
                            <option value="Kas Masuk">Kas Masuk</option>
                            <option value="Kas Keluar">Kas Keluar</option>
                        </select>
                        <input type="text" id="ins-uraian" placeholder="Uraian Keterangan" required class="w-full p-2.5 bg-slate-50 border rounded-xl mb-3 text-xs">
                        <input type="number" id="ins-nominal" placeholder="Nominal Rp" required class="w-full p-2.5 bg-slate-50 border rounded-xl mb-4 text-xs">
                        <button type="submit" id="btn-save" class="w-full bg-teal-600 text-white p-3 rounded-xl font-bold text-xs uppercase">Simpan Data</button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbw7gr8DhK_ajAOhPlFByhuKnsqFDi6kzsbL9kjHIXb04mJN0t8Z00H47LODnFVx3edr/exec";

        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('login-username').value === "muslimah" && document.getElementById('login-password').value === "bismillah") {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-dashboard').classList.remove('hidden');
                tarikData();
            }
        });

        function tarikData() {
            fetch(`${URL_API}?action=read`)
                .then(r => r.json())
                .then(res => {
                    const tbody = document.getElementById('tabel-kas-body');
                    tbody.innerHTML = '';
                    (res.transaksi || []).forEach(item => {
                        tbody.innerHTML += `<tr><td class="p-3">${item.tanggal}</td><td class="p-3">${item.nama}</td><td class="p-3">${item.jenis}</td><td class="p-3">${item.uraian}</td><td class="p-3">${item.nominal}</td></tr>`;
                    });
                });
        }

        document.getElementById('form-transaksi').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.innerText = "Menyimpan...";
            const data = {
                tanggal: document.getElementById('ins-tanggal').value,
                nama: document.getElementById('ins-nama').value,
                jenis: document.getElementById('ins-jenis').value,
                uraian: document.getElementById('ins-uraian').value,
                nominal: document.getElementById('ins-nominal').value
            };
            fetch(URL_API, { method: "POST", mode: 'no-cors', body: JSON.stringify({ action: "create", data: data }) })
            .then(() => {
                alert("Data Tersimpan!");
                document.getElementById('form-transaksi').reset();
                btn.innerText = "Simpan Data";
                tarikData();
            });
        });

        function pindahMenu(id) {
            document.querySelectorAll('.menu-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
