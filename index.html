<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan Muslimah Wahdah Sulteng</title>
    <!-- Tailwind CSS untuk Styling Cepat & Modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js untuk Presentasi Arus Kas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f0f7f7; font-family: 'Poppins', sans-serif; }
        .bg-tosca-relaxa { background-color: #00a896; }
        .bg-tosca-dark { background-color: #028090; }
        .text-tosca { color: #028090; }
        /* Efek lengkungan estetik terinspirasi dari file 75273.jpg */
        .curve-header {
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }
    </style>
</head>
<body>

    <!-- Header Terinspirasi dari Aksen Lengkung Gambar 75273.jpg -->
    <div class="bg-tosca-relaxa text-white pt-8 pb-12 px-6 curve-header shadow-md text-center relative">
        <h1 class="text-xl font-bold tracking-wide">Muslimah Wahdah</h1>
        <p class="text-xs opacity-90">Wilayah Sulawesi Tengah</p>
        <p class="text-2xl font-extrabold mt-4" id="saldo-akhir">Rp 0</p>
        <p class="text-[10px] uppercase tracking-widest opacity-75">Total Saldo Kas</p>
    </div>

    <!-- Ringkasan Arus Kas Masuk & Keluar -->
    <div class="grid grid-cols-2 gap-4 px-6 -mt-6">
        <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-emerald-500">
            <span class="text-xs text-gray-400 block font-medium">Arus Masuk</span>
            <span class="text-sm font-bold text-emerald-600" id="total-masuk">Rp 0</span>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-rose-500">
            <span class="text-xs text-gray-400 block font-medium">Arus Keluar</span>
            <span class="text-sm font-bold text-rose-600" id="total-keluar">Rp 0</span>
        </div>
    </div>

    <!-- Konten Dashboard Utama -->
    <div class="p-6 space-y-6 mb-20">
        
        <!-- Presentasi Grafik Arus Kas -->
        <div class="bg-white p-5 rounded-2xl shadow-xs">
            <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                <span class="w-2 h-4 bg-tosca-relaxa rounded-full"></span> Presentasi Arus Kas
            </h3>
            <div class="w-full max-w-[250px] mx-auto">
                <canvas id="cashFlowChart"></canvas>
            </div>
        </div>

        <!-- Data Divisi Anggaran -->
        <div class="bg-white p-5 rounded-2xl shadow-xs">
            <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                <span class="w-2 h-4 bg-tosca-relaxa rounded-full"></span> Data Divisi Anggaran
            </h3>
            <div class="space-y-3" id="container-divisi">
                <!-- Data akan di-load otomatis dari spreadsheet -->
                <p class="text-xs text-gray-400 italic">Memuat data anggaran...</p>
            </div>
        </div>

        <!-- Uraian Belanja / Transaksi Terakhir -->
        <div class="bg-white p-5 rounded-2xl shadow-xs">
            <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                <span class="w-2 h-4 bg-tosca-relaxa rounded-full"></span> Uraian Belanja & Transaksi
            </h3>
            <div class="divide-y divide-gray-100 max-h-60 overflow-y-auto space-y-2" id="container-belanja">
                <!-- Data transaksi akan di-load otomatis -->
                <p class="text-xs text-gray-400 italic">Memuat uraian belanja...</p>
            </div>
        </div>

    </div>

    <!-- Integrasi Javascript & Sinkronisasi API Spreadsheet -->
    <script>
        // GANTI URL INI dengan Web App URL dari Google Apps Script Anda nanti
        const SPREADSHEET_API_URL = "https://script.google.com/macros/s/AKfycbwTkyeOEpbtClW25--UAYv_3u9kteLEjl4ReIqfLqTqf4A089BJr-C-sJxKx1G3zrflsQ/exec";

        async function fetchData() {
            try {
                const response = await fetch(SPREADSHEET_API_URL);
                const data = await response.json();
                
                // 1. Update Ringkasan Saldo
                document.getElementById('saldo-akhir').innerText = data.ringkasan.saldoAkhir;
                document.getElementById('total-masuk').innerText = data.ringkasan.totalMasuk;
                document.getElementById('total-keluar').innerText = data.ringkasan.totalKeluar;

                // 2. Render Chart Presentasi Arus Kas
                renderChart(data.ringkasan.persenMasuk, data.ringkasan.persenKeluar);

                // 3. Render Anggaran Divisi
                const divisiContainer = document.getElementById('container-divisi');
                divisiContainer.innerHTML = '';
                data.anggaranDivisi.forEach(div => {
                    divisiContainer.innerHTML += `
                        <div class="text-xs">
                            <div class="flex justify-between font-medium text-gray-600 mb-1">
                                <span>${div.nama}</span>
                                <span class="text-gray-400">${div.terrealisasi} / ${div.pagu}</span>
                            </div>
                            <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-tosca-relaxa h-full" style="width: ${div.persentase}%"></div>
                            </div>
                        </div>
                    `;
                });

                // 4. Render Uraian Belanja
                const belanjaContainer = document.getElementById('container-belanja');
                belanjaContainer.innerHTML = '';
                data.uraianBelanja.forEach(item => {
                    const isMasuk = item.jenis === "Masuk";
                    belanjaContainer.innerHTML += `
                        <div class="flex justify-between items-center py-2 text-xs">
                            <div>
                                <p class="font-bold text-gray-700">${item.keterangan}</p>
                                <p class="text-[10px] text-gray-400">${item.tanggal} • Div. ${item.divisi}</p>
                            </div>
                            <span class="font-bold ${isMasuk ? 'text-emerald-600' : 'text-rose-600'}">
                                ${isMasuk ? '+' : '-'} ${item.jumlah}
                            </span>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Gagal sinkronisasi data:", error);
                // Fallback Tampilan Mockup jika API belum terpasang
                loadMockData();
            }
        }

        function renderChart(masuk, keluar) {
            const ctx = document.getElementById('cashFlowChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Masuk (%)', 'Keluar (%)'],
                    datasets: [{
                        data: [masuk, keluar],
                        backgroundColor: ['#00a896', '#f43f5e'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
            });
        }

        function loadMockData() {
            // Data simulasi awal agar aplikasi langsung terlihat estetik saat dibuka pertama kali
            document.getElementById('saldo-akhir').innerText = "Rp 14.250.000";
            document.getElementById('total-masuk').innerText = "Rp 20.000.000";
            document.getElementById('total-keluar').innerText = "Rp 5.750.000";
            renderChart(71, 29);
            
            document.getElementById('container-divisi').innerHTML = `
                <div class="text-xs">
                    <div class="flex justify-between font-medium text-gray-600 mb-1"><span>Divisi Dakwah</span><span>Rp 2.5M / Rp 5M</span></div>
                    <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden"><div class="bg-tosca-relaxa h-full" style="width: 50%"></div></div>
                </div>
                <div class="text-xs">
                    <div class="flex justify-between font-medium text-gray-600 mb-1"><span>Divisi Sosial</span><span>Rp 1.2M / Rp 3M</span></div>
                    <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden"><div class="bg-tosca-relaxa h-full" style="width: 40%"></div></div>
                </div>
            `;
            
            document.getElementById('container-belanja').innerHTML = `
                <div class="flex justify-between items-center py-2 text-xs">
                    <div><p class="font-bold text-gray-700">Konsumsi Kajian Wilayah</p><p class="text-[10px] text-gray-400">02 Juli 2026 • Div. Dakwah</p></div>
                    <span class="font-bold text-rose-600">- Rp 750.000</span>
                </div>
                <div class="flex justify-between items-center py-2 text-xs">
                    <div><p class="font-bold text-gray-700">Infaq Kas Bulanan Anggota</p><p class="text-[10px] text-gray-400">01 Juli 2026 • Umum</p></div>
                    <span class="font-bold text-emerald-600">+ Rp 5.000.000</span>
                </div>
            `;
        }

        window.onload = fetchData;
    </script>
</body>
</html>
