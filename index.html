<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan MWW Sulteng</title>
    <!-- Framework CSS Ringan & Stabil (Lolos Sensor GitHub) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
            background-color: #f0fdf4;
            color: #1e293b;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .header-box {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(4, 120, 87, 0.2);
        }
        .header-box h1 { margin: 0; font-size: 24px; font-weight: 800; color: white; }
        .header-box p { margin: 5px 0 0 0; font-size: 14px; color: #a7f3d0; }
        .grid-kas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card-kas {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border-bottom: 5px solid #059669;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .card-kas.keluar { border-bottom-color: #f43f5e; }
        .label-kas { font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: bold; }
        .nilai-kas { font-size: 22px; font-weight: 800; display: block; margin-top: 5px; }
        .text-masuk { color: #059669; }
        .text-keluar { color: #f43f5e; }
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .tabel-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #ecfdf5; color: #065f46; font-weight: bold; }
        td, th { padding: 12px; text-align: left; }
        .status-cloud {
            background-color: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- HEADER LOGO & JUDUL -->
    <div class="header-box">
        <h1>Muslimah Wahdah Wilayah</h1>
        <p>Sulawesi Tengah</p>
        <div class="status-cloud" id="status-koneksi">Mode Sinkronisasi Lokal</div>
        <h2 style="color: white; margin-top: 20px; font-size: 32px;" id="saldo-akhir">Rp 0</h2>
        <span style="font-size: 11px; color: #a7f3d0; text-transform: uppercase; tracking-spacing: 1px;">Total Saldo Berjalan (Kolom E)</span>
    </div>

    <!-- RINGKASAN MASUK / KELUAR -->
    <div class="grid-kas">
        <div class="card-kas">
            <span class="label-kas">Kredit / Masuk (Kolom D)</span>
            <span class="nilai-kas text-masuk" id="total-masuk">Rp 0</span>
        </div>
        <div class="card-kas keluar">
            <span class="label-kas">Debit / Keluar (Kolom C)</span>
            <span class="nilai-kas text-keluar" id="total-keluar">Rp 0</span>
        </div>
    </div>

    <!-- FORM INPUT JURNAL KAS -->
    <div class="form-container">
        <h3 style="margin-top: 0; color: #0f172a;">Form Input Kas Jurnal</h3>
        <form id="form-transaksi" onsubmit="simpanTransaksi(event)">
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <label>Tanggal (Kolom A)</label>
                    <input type="datetime-local" id="input-tanggal" required>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label>Jenis Arus (Kolom B)</label>
                    <select id="input-jenis">
                        <option value="Masuk">Kredit (Masuk)</option>
                        <option value="Keluar">Debit (Keluar)</option>
                    </select>
                </div>
            </div>

            <label>Uraian Keterangan</label>
            <input type="text" id="input-keterangan" placeholder="Contoh: Infak Kas Bulanan" required>

            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <label>Divisi / Kategori (Kolom F)</label>
                    <input type="text" id="input-divisi" placeholder="Contoh: Dakwah / Humas" required>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label>Nominal (Rupiah)</label>
                    <input type="number" id="input-jumlah" placeholder="0" required>
                </div>
            </div>

            <button type="submit" style="width: 100%; background-color: #059669; color: white; font-weight: bold; margin-top: 15px; cursor: pointer;">
                Kirim & Amankan ke Spreadsheet
            </button>
        </form>
    </div>

    <!-- TABEL DATA JURNAL KAS -->
    <div class="tabel-container">
        <h3 style="margin-top: 0; color: #0f172a;">Jurnal Transaksi Kas Terintegrasi</h3>
        <table>
            <thead>
                <tr>
                    <th>Tanggal (A)</th>
                    <th>Jenis (B)</th>
                    <th>Debit/Keluar (C)</th>
                    <th>Kredit/Masuk (D)</th>
                    <th>Saldo (E)</th>
                    <th>Divisi (F)</th>
                </tr>
            </thead>
            <tbody id="tabel-body">
                <!-- Data Masuk Disini -->
            </tbody>
        </table>
    </div>

    <script>
        // PASTE URL WEB APP APPS SCRIPT ANDA DI BAWAH INI
        const URL_SPREADSHEET_API = "MASUKKAN_URL_WEB_APP_APPS_SCRIPT_ANDA_DISINI";

        let dataTransaksi = [];

        window.onload = function() {
            const dataLokal = localStorage.getItem('mww_sulteng_kas');
            dataTransaksi = dataLokal ? JSON.parse(dataLokal) : [];
            
            if(URL_SPREADSHEET_API && URL_SPREADSHEET_API !== "MASUKKAN_URL_WEB_APP_APPS_SCRIPT_ANDA_DISINI") {
                document.getElementById('status-koneksi').innerText = "Terintegrasi Cloud Spreadsheet";
                document.getElementById('status-koneksi').style.backgroundColor = "#047857";
            }
            renderData();
        };

        function renderData() {
            const tbody = document.getElementById('tabel-body');
            tbody.innerHTML = '';
            
            let totalMasuk = 0, totalKeluar = 0, runningSaldo = 0;
            
            // Hitung kronologis
            const dataDihitung = [...dataTransaksi].reverse();
            const dataRender = dataDihitung.map(item => {
                let debit = item.jenis === "Keluar" ? item.jumlah : 0;
                let kredit = item.jenis === "Masuk" ? item.jumlah : 0;
                runningSaldo += (kredit - debit);
                
                if(item.jenis === "Masuk") totalMasuk += item.jumlah;
                if(item.jenis === "Keluar") totalKeluar += item.jumlah;
                
                return { ...item, debit, kredit, saldoSekarang: runningSaldo };
            }).reverse();

            dataRender.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.tanggal}</td>
                        <td><strong>${item.jenis === 'Masuk' ? 'Kredit' : 'Debit'}</strong></td>
                        <td class="text-keluar">${item.debit > 0 ? 'Rp ' + item.debit.toLocaleString('id-ID') : '-'}</td>
                        <td class="text-masuk">${item.kredit > 0 ? 'Rp ' + item.kredit.toLocaleString('id-ID') : '-'}</td>
                        <td><strong>Rp ${item.saldoSekarang.toLocaleString('id-ID')}</strong></td>
                        <td>${item.divisi}</td>
                    </tr>
                `;
            });

            document.getElementById('saldo-akhir').innerText = "Rp " + runningSaldo.toLocaleString('id-ID');
            document.getElementById('total-masuk').innerText = "Rp " + totalMasuk.toLocaleString('id-ID');
            document.getElementById('total-keluar').innerText = "Rp " + totalKeluar.toLocaleString('id-ID');
        }

        function simpanTransaksi(e) {
            e.preventDefault();
            const rawDate = new Date(document.getElementById('input-tanggal').value);
            const formatTgl = rawDate.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

            const dataBaru = {
                tanggal: formatTgl,
                jenis: document.getElementById('input-jenis').value,
                keterangan: document.getElementById('input-keterangan').value,
                divisi: document.getElementById('input-divisi').value,
                jumlah: parseInt(document.getElementById('input-jumlah').value)
            };

            dataTransaksi.unshift(dataBaru);
            localStorage.setItem('mww_sulteng_kas', JSON.stringify(dataTransaksi));
            
            kirimKeCloud(dataBaru);
            document.getElementById('form-transaksi').reset();
            renderData();
        }

        function kirimKeCloud(data) {
            if (!URL_SPREADSHEET_API || URL_SPREADSHEET_API === "https://script.google.com/macros/s/AKfycbwFQ41OEiwkWVduYOxBucgoJBYVXiDRC4BZLeE5d7n8sM1sjjmaLXrK-P0XgI7Cy2U7Sw/exec") return;
            
            const urlDenganParam = `${URL_SPREADSHEET_API}?tanggal=${encodeURIComponent(data.tanggal)}&jenis=${encodeURIComponent(data.jenis)}&keterangan=${encodeURIComponent(data.keterangan)}&divisi=${encodeURIComponent(data.divisi)}&jumlah=${data.jumlah}`;
            
            fetch(urlDenganParam, { method: "GET", mode: "no-cors" })
            .then(() => console.log("Berhasil Terkirim ke Spreadsheet"))
            .catch(err => console.log("Tersimpan secara lokal"));
        }
    </script>
</body>
</html>
